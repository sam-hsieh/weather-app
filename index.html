<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天氣API</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/05-api.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>
    <div class="container mx-4">
        <div class="d-flex align-items-center">
            <h3 id="showcity" class="me-2"></h3>
            <h1 id="temperature"></h1>
        </div>

        <h1 id="weatherInfo">多雲時晴</h1>
        <p id="displayTime"></p>
        <hr>
        <div class="row justify-content-center g-3">
            <div class="col-6 col-md-3">
                <a class="btn btn-outline-light text-center d-block btn-city " href="#">臺北市</a>
            </div>
            <div class="col-6 col-md-3">
                <a class="btn btn-outline-light text-center d-block btn-city " href="#">臺中市</a>
            </div>
            <div class="col-6 col-md-3">
                <a class="btn btn-outline-light text-center d-block btn-city " href="#">高雄市</a>
            </div>
            <div class="col-6 col-md-3">
                <a class="btn btn-outline-light text-center d-block btn-city " href="#">澎湖縣</a>
            </div>
        </div>
    </div>
    <div id="loading">
        <div class="spinner-border text-light" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
    <script src="./js/app.js"></script>
</body>

</html>
